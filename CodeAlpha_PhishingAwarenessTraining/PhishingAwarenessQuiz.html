<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Awareness Training — Interactive Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0D1B2A;--teal:#1B6CA8;--accent:#00C9A7;--red:#E63946;
    --green:#2ECC71;--light:#E8F4FD;--midcard:#1A2D42;--darkcard:#142030;
    --orange:#E67E22;--white:#fff;
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh}

  /* ── LANDING ── */
  #landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
  .shield{font-size:80px;margin-bottom:1rem;filter:drop-shadow(0 0 24px #00C9A7aa)}
  #landing h1{font-size:2.6rem;font-weight:700;letter-spacing:4px;margin-bottom:.5rem}
  #landing h1 span{color:var(--accent)}
  #landing p{color:#A8C8E8;font-size:1.05rem;max-width:520px;margin:.6rem auto 2rem}
  .stat-row{display:flex;gap:1rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
  .stat{background:var(--midcard);border-radius:12px;padding:.8rem 1.6rem;text-align:center}
  .stat strong{display:block;font-size:1.8rem;color:var(--accent)}
  .stat span{font-size:.8rem;color:#7ABFDB;letter-spacing:1px;text-transform:uppercase}
  .start-btn{background:var(--accent);color:var(--navy);border:none;border-radius:50px;padding:.9rem 2.8rem;font-size:1.1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:transform .15s,box-shadow .15s}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px #00C9A766}

  /* ── QUIZ WRAPPER ── */
  #quiz-section{display:none;max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}

  /* progress */
  .progress-wrap{margin-bottom:1.5rem}
  .prog-meta{display:flex;justify-content:space-between;font-size:.82rem;color:#7ABFDB;margin-bottom:.4rem}
  .prog-bar-bg{height:5px;background:#1E3A5F;border-radius:3px}
  .prog-bar-fill{height:5px;background:var(--accent);border-radius:3px;transition:width .4s ease}

  /* header bar */
  .q-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
  .pill{padding:.3rem .85rem;border-radius:50px;font-size:.75rem;font-weight:700;letter-spacing:1px}
  .pill-q{background:var(--accent);color:var(--navy)}
  .pill-email{background:var(--teal)}
  .pill-website{background:#8E44AD}
  .verdict-badge{margin-left:auto;padding:.3rem 1rem;border-radius:6px;font-size:.8rem;font-weight:700;letter-spacing:1px}
  .verdict-phishing{background:var(--red)}
  .verdict-legitimate{background:var(--green);color:var(--navy)}

  /* question */
  .question-text{font-size:1.15rem;font-weight:600;margin-bottom:1.2rem;line-height:1.5}

  /* two-col layout */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
  @media(max-width:640px){.two-col{grid-template-columns:1fr}}

  /* scenario panel */
  .scenario-panel{background:var(--midcard);border-radius:12px;overflow:hidden}
  .email-meta{padding:.9rem 1rem;border-bottom:1px solid #1E3A5F}
  .email-row{display:flex;gap:.5rem;align-items:baseline;font-size:.82rem;margin-bottom:.3rem}
  .email-row:last-child{margin-bottom:0}
  .email-label{color:#7ABFDB;font-weight:600;min-width:58px;text-transform:uppercase;font-size:.72rem}
  .email-val{color:var(--white);word-break:break-all}
  .email-val.suspicious{color:#FFAAAA;font-weight:600}
  .email-body-text{padding:.9rem 1rem;font-size:.85rem;color:#A8C8E8;line-height:1.7}

  /* browser bar */
  .browser-chrome{background:#0A1628;padding:.5rem .8rem;display:flex;align-items:center;gap:.6rem}
  .browser-dots{display:flex;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%}
  .url-bar{flex:1;background:#162035;border-radius:4px;padding:.25rem .6rem;font-size:.75rem;font-family:'Courier New',monospace;display:flex;align-items:center;gap:.4rem}
  .url-protocol{color:#A8C8E8}
  .url-protocol.insecure{color:var(--red)}
  .url-domain{color:var(--white);font-weight:700}
  .url-path{color:#7ABFDB}
  .site-desc{padding:.9rem 1rem;font-size:.85rem;color:#A8C8E8;line-height:1.6}
  .site-label{font-size:.75rem;color:#7ABFDB;font-weight:600;text-transform:uppercase;margin-bottom:.4rem}

  /* flags panel */
  .flags-panel{background:var(--midcard);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .flags-header{padding:.7rem 1rem;font-size:.78rem;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:.5rem}
  .flags-header.red{background:#200A0A;color:var(--red);border-bottom:1px solid #3A1010}
  .flags-header.green{background:#0A2015;color:var(--green);border-bottom:1px solid #0D3320}
  .flags-list{padding:.6rem 1rem;flex:1}
  .flag-item{display:flex;align-items:flex-start;gap:.5rem;padding:.35rem 0;font-size:.83rem;border-bottom:1px solid #1E3A5F}
  .flag-item:last-child{border-bottom:none}
  .flag-item .icon{margin-top:2px;flex-shrink:0}
  .flag-item.bad .icon{color:var(--red)}
  .flag-item.good .icon{color:var(--green)}
  .flag-item.bad .text{color:#FFAAAA}
  .flag-item.good .text{color:#90EE90}
  .explanation{padding:.8rem 1rem;background:#0F1E30;border-top:1px solid #1E3A5F;font-size:.82rem;color:#B8D4E8;line-height:1.6}
  .explanation strong{display:block;color:var(--accent);font-size:.72rem;letter-spacing:2px;margin-bottom:.4rem;text-transform:uppercase}

  /* answer options */
  .options-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1rem}
  @media(max-width:480px){.options-row{grid-template-columns:1fr}}
  .opt-btn{width:100%;padding:.85rem 1rem;border-radius:10px;border:1.5px solid #1E3A5F;background:var(--midcard);color:var(--white);font-size:.9rem;cursor:pointer;text-align:left;display:flex;align-items:center;gap:.6rem;transition:border-color .15s,background .15s}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);background:#1E3A5F}
  .opt-btn:disabled{cursor:default}
  .opt-btn.correct{background:#0D3320;border-color:var(--green)}
  .opt-btn.wrong{background:#2D0A0A;border-color:var(--red)}
  .opt-btn.reveal{opacity:.5}
  .opt-letter{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;background:#1E3A5F;flex-shrink:0}
  .opt-btn.correct .opt-letter{background:var(--green);color:var(--navy)}
  .opt-btn.wrong .opt-letter{background:var(--red)}

  /* feedback */
  .feedback{border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.88rem;line-height:1.6;display:none}
  .feedback.show{display:block}
  .feedback.correct{background:#0D3320;border:1px solid var(--green);color:#90EE90}
  .feedback.wrong{background:#2D0A0A;border:1px solid var(--red);color:#FFAAAA}
  .feedback strong{display:block;margin-bottom:.3rem;font-size:.95rem}

  /* next btn */
  .next-wrap{display:flex;justify-content:flex-end}
  .next-btn{background:var(--accent);color:var(--navy);border:none;border-radius:50px;padding:.7rem 2rem;font-size:.95rem;font-weight:700;cursor:pointer;display:none;transition:transform .1s}
  .next-btn.show{display:inline-flex;align-items:center;gap:.4rem}
  .next-btn:hover{transform:translateY(-1px)}

  /* result */
  #result-section{display:none;max-width:600px;margin:0 auto;padding:3rem 1.5rem;text-align:center}
  .result-emoji{font-size:64px;margin-bottom:1rem}
  .result-score{font-size:3rem;font-weight:700;color:var(--accent);margin-bottom:.3rem}
  .result-title{font-size:1.5rem;font-weight:600;margin-bottom:.5rem}
  .result-sub{color:#A8C8E8;font-size:.95rem;max-width:440px;margin:0 auto 2rem}
  .badges{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-bottom:2rem}
  .badge{padding:.4rem 1rem;border-radius:50px;font-size:.8rem;border:1px solid #1E3A5F;color:#7ABFDB;background:var(--midcard)}
  .badge.earned{background:#0D3320;border-color:var(--green);color:#90EE90}
  .restart-btn{background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:50px;padding:.7rem 2rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s}
  .restart-btn:hover{background:#00C9A722}

  /* score bar */
  .score-summary{background:var(--midcard);border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:2rem}
  .score-row-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;font-size:.88rem;border-bottom:1px solid #1E3A5F}
  .score-row-item:last-child{border-bottom:none}
  .score-row-item span:first-child{color:#A8C8E8}
  .score-row-item span:last-child{font-weight:600}
  .correct-count{color:var(--green)}
  .wrong-count{color:var(--red)}
</style>
</head>
<body>

<!-- LANDING -->
<section id="landing">
  <div class="shield">🛡️</div>
  <h1>PHISHING <span>QUIZ</span></h1>
  <p>Test your ability to spot phishing attacks. Real-world email and website scenarios — modelled on Google's Jigsaw Phishing Quiz.</p>
  <div class="stat-row">
    <div class="stat"><strong>8</strong><span>Scenarios</span></div>
    <div class="stat"><strong>2</strong><span>Types</span></div>
    <div class="stat"><strong>Real</strong><span>Examples</span></div>
  </div>
  <button class="start-btn" onclick="startQuiz()">Start Quiz &nbsp;→</button>
</section>

<!-- QUIZ -->
<section id="quiz-section">
  <div class="progress-wrap">
    <div class="prog-meta">
      <span id="q-label">Question 1 of 8</span>
      <span>Score: <strong id="score-display">0</strong></span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="q-header" id="q-header"></div>
  <p class="question-text" id="question-text"></p>

  <div class="two-col" id="two-col"></div>
  <div class="options-row" id="options-row"></div>
  <div class="feedback" id="feedback"></div>
  <div class="next-wrap"><button class="next-btn" id="next-btn" onclick="nextQ()">Next &nbsp;→</button></div>
</section>

<!-- RESULT -->
<section id="result-section">
  <div class="result-emoji" id="res-emoji"></div>
  <div class="result-score" id="res-score"></div>
  <div class="result-title" id="res-title"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="score-summary" id="score-summary"></div>
  <div class="badges" id="badges"></div>
  <button class="restart-btn" onclick="startQuiz()">↺ &nbsp; Try Again</button>
</section>

<script>
const questions = [
  {
    tag:"EMAIL", tagClass:"pill-email",
    scenario:{
      type:"email",
      from:"PayPal Security",
      email:"security-alerts@paypa1-support.com",
      emailClass:"suspicious",
      subject:"⚠ Your account has been limited",
      body:"Dear Customer, We've noticed unusual activity on your PayPal account. Your access has been temporarily limited. To restore full access, please verify your identity within 24 hours or your account will be permanently suspended. — PayPal Security Team"
    },
    question:"Is this email from PayPal legitimate?",
    options:["Legitimate — PayPal sends security alerts","Phishing — this is a fake email"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Sender domain: paypa1-support.com (\"1\" not \"l\")",
      "Urgent 24-hour deadline creates panic",
      "Threatens permanent account suspension",
      "Real PayPal only uses @paypal.com"
    ]},
    explanation:"The sender domain uses the number \"1\" instead of the letter \"l\" — a classic typosquatting trick. PayPal only ever sends email from @paypal.com. The 24-hour deadline and suspension threat are social engineering tactics designed to override your judgement."
  },
  {
    tag:"WEBSITE", tagClass:"pill-website",
    scenario:{
      type:"website",
      protocol:"http://", protocolClass:"insecure",
      domain:"secure-google-login.net",
      path:"/accounts/signin",
      lock:"🔓", lockColor:"color:var(--red)",
      desc:"Looks exactly like the Google sign-in page — Google logo, \"Sign in to Google\" heading, email and password input fields."
    },
    question:"You searched for Google and landed here. Safe to log in?",
    options:["Yes — it looks exactly like Google","No — this is a fake phishing site"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Uses HTTP — no encryption, no padlock",
      "Domain is secure-google-login.net, NOT google.com",
      "\"Secure\" in the domain is a trust trick",
      "Google always uses https://google.com"
    ]},
    explanation:"HTTP means there is no encryption. The domain is \"secure-google-login.net\" — not google.com. Attackers can perfectly copy a site's visual appearance; always check the URL bar first, not how the page looks."
  },
  {
    tag:"EMAIL", tagClass:"pill-email",
    scenario:{
      type:"email",
      from:"Microsoft Account Team",
      email:"account-security@microsoft.com",
      emailClass:"",
      subject:"Unusual sign-in activity on your Microsoft account",
      body:"Hi [name], We detected a sign-in to your account from a new device. Location: Lagos, Nigeria | Device: Windows 11 | Time: 3:42 AM. If this was you, you can safely ignore this email. If it wasn't you, please review recent activity."
    },
    question:"Is this Microsoft security alert phishing or legitimate?",
    options:["Likely legitimate — sent from microsoft.com","Phishing — all security alerts are fake"],
    answer:0,
    verdict:"LEGITIMATE", verdictClass:"verdict-legitimate",
    flags:{type:"green", title:"✔  TRUST SIGNALS", items:[
      "Sender is @microsoft.com — the real domain",
      "Specific details: time, location, device",
      "No urgency threats or deadlines",
      "Tells you to ignore it if it was you"
    ]},
    explanation:"This email is likely real. It comes from @microsoft.com (correct domain), includes specific sign-in details, and contains no threatening language. Even so, the safest approach is always to navigate directly to microsoft.com rather than clicking any link."
  },
  {
    tag:"WEBSITE", tagClass:"pill-website",
    scenario:{
      type:"website",
      protocol:"https://", protocolClass:"",
      domain:"amazon-order-support.com",
      path:"/verify-payment",
      lock:"🔒", lockColor:"color:var(--orange)",
      desc:"Page asks you to confirm your full credit card number, expiry date, CVV, and billing address to verify Order #113-4829301. Payment verification required."
    },
    question:"HTTPS is showing. Safe to enter your card details?",
    options:["Yes — HTTPS means it's secure","No — HTTPS alone doesn't mean legitimate"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Domain: amazon-order-support.com ≠ amazon.com",
      "HTTPS only encrypts data — not proof of identity",
      "Amazon never re-asks for full card + CVV",
      "Always go directly to amazon.com"
    ]},
    explanation:"HTTPS only means the connection is encrypted — attackers can easily get SSL certificates for fake sites. The real red flag is the domain: amazon-order-support.com is not amazon.com. Amazon never asks you to re-enter full card details on a separate site."
  },
  {
    tag:"EMAIL", tagClass:"pill-email",
    scenario:{
      type:"email",
      from:"Netflix",
      email:"billing@netfliix-accounts.com",
      emailClass:"suspicious",
      subject:"Your payment failed — update your billing info",
      body:"Dear Netflix Member, We're having trouble processing your payment. Update your billing information within 48 hours to keep your membership active, otherwise your account will be cancelled. — The Netflix Team"
    },
    question:"Netflix payment failed — what should you do?",
    options:["Click 'Update Payment Info' in the email","Go directly to netflix.com to check your account"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Sender: netfliix-accounts.com (double \"i\")",
      "48-hour cancellation threat",
      "Generic greeting: \"Dear Netflix Member\"",
      "Real Netflix only uses @netflix.com"
    ]},
    explanation:"The domain \"netfliix-accounts.com\" has a double \"i\" — classic typosquatting. Always navigate directly to netflix.com to check your account. If your payment really failed, Netflix shows a notice when you log into their actual website."
  },
  {
    tag:"EMAIL", tagClass:"pill-email",
    scenario:{
      type:"email",
      from:"Security Department",
      email:"no-reply@secure-banking-alert.org",
      emailClass:"suspicious",
      subject:"URGENT: Suspicious transaction — verify in 30 MINUTES",
      body:"IMPORTANT SECURITY NOTICE — A suspicious transaction of $2,847.00 has been detected on your account ending in **6291. You MUST verify your identity immediately. You have 30 MINUTES or the transfer will complete. [VERIFY IDENTITY NOW]"
    },
    question:"Urgent bank alert — $2,847 transaction — what do you do?",
    options:["Click verify — 30 minutes is not long","Call your bank's official number immediately"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Sender: secure-banking-alert.org — not a bank domain",
      "Extreme 30-minute deadline creates panic",
      "ALL CAPS urgency designed to override logic",
      "No bank name even mentioned in the email"
    ]},
    explanation:"The 30-minute deadline is a social engineering tactic designed to panic you into clicking without thinking. Real banks send email from their own domain (e.g., @yourbank.com), not generic .org addresses. Always call the number on the back of your card."
  },
  {
    tag:"WEBSITE", tagClass:"pill-website",
    scenario:{
      type:"website",
      protocol:"https://", protocolClass:"",
      domain:"www.paypal.com",
      path:"/signin",
      lock:"🔒", lockColor:"color:var(--green)",
      desc:"PayPal sign-in page with the PayPal logo, email and password fields with rounded pill-style buttons, and the classic PayPal dark-blue colour scheme."
    },
    question:"You need to log in to PayPal. Is this page safe?",
    options:["Yes — https://www.paypal.com is the real domain","No — never log in via browser links"],
    answer:0,
    verdict:"LEGITIMATE", verdictClass:"verdict-legitimate",
    flags:{type:"green", title:"✔  TRUST SIGNALS", items:[
      "HTTPS enabled — padlock present",
      "Exact domain: www.paypal.com",
      "Not paypa1.com or paypal-verify.net",
      "HTTPS + correct domain = safe to proceed"
    ]},
    explanation:"This is the real PayPal. The URL is exactly https://www.paypal.com — correct domain with HTTPS. The key skill is distinguishing paypal.com from paypa1.com or paypal-support.com. When both HTTPS and the exact domain are correct, it is safe."
  },
  {
    tag:"EMAIL", tagClass:"pill-email",
    scenario:{
      type:"email",
      from:"IT Support",
      email:"it-support@yourcompany-helpdesk.com",
      emailClass:"suspicious",
      subject:"Mandatory password reset required today",
      body:"Hi, Our security systems detected your password in a recent data breach. You must reset your password TODAY to avoid account suspension. Click to reset — link expires in 2 hours. Do not share this link with anyone. — IT Security Team"
    },
    question:"IT says reset your password in 2 hours. What do you do?",
    options:["Click the reset link — IT needs you to act fast","Contact IT directly via official channels"],
    answer:1,
    verdict:"PHISHING", verdictClass:"verdict-phishing",
    flags:{type:"red", title:"⚠  RED FLAGS", items:[
      "Sender: yourcompany-helpdesk.com — external domain",
      "2-hour expiry creates pressure",
      "Generic greeting \"Hi\" — no name",
      "Real IT uses your company's own domain"
    ]},
    explanation:"Your company's IT department would email from your actual company domain, not an external helpdesk domain. The 2-hour expiry creates panic. Always contact IT through official channels — internal chat, ticketing system, or a known phone number."
  }
];

let current = 0, score = 0, answered = false, wrongQs = [], correctQs = [];

function startQuiz(){
  current = 0; score = 0; answered = false; wrongQs = []; correctQs = [];
  document.getElementById('landing').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  renderQ();
}

function renderQ(){
  answered = false;
  const q = questions[current];
  document.getElementById('prog-fill').style.width = ((current / questions.length) * 100) + '%';
  document.getElementById('q-label').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('score-display').textContent = score;

  // header
  document.getElementById('q-header').innerHTML = `
    <span class="pill pill-q">Q${current + 1}</span>
    <span class="pill ${q.tagClass}">${q.tag}</span>
    <span class="verdict-badge ${q.verdictClass}">${q.verdict}</span>`;

  document.getElementById('question-text').textContent = q.question;

  // scenario + flags
  let scenarioHTML = '';
  if(q.scenario.type === 'email'){
    scenarioHTML = `<div class="scenario-panel">
      <div class="email-meta">
        <div class="email-row"><span class="email-label">From</span><span class="email-val ${q.scenario.emailClass}">${q.scenario.from} &lt;${q.scenario.email}&gt;</span></div>
        <div class="email-row"><span class="email-label">Subject</span><span class="email-val" style="font-weight:600">${q.scenario.subject}</span></div>
      </div>
      <div class="email-body-text">${q.scenario.body}</div>
    </div>`;
  } else {
    scenarioHTML = `<div class="scenario-panel">
      <div class="browser-chrome">
        <div class="browser-dots">
          <div class="dot" style="background:#ff5f57"></div>
          <div class="dot" style="background:#febc2e"></div>
          <div class="dot" style="background:#28c840"></div>
        </div>
        <div class="url-bar">
          <span style="${q.scenario.lockColor}">${q.scenario.lock}</span>
          <span class="url-protocol ${q.scenario.protocolClass}">${q.scenario.protocol}</span><span class="url-domain">${q.scenario.domain}</span><span class="url-path">${q.scenario.path}</span>
        </div>
      </div>
      <div class="site-desc"><div class="site-label">Page content</div>${q.scenario.desc}</div>
    </div>`;
  }

  const flagsHTML = `<div class="flags-panel">
    <div class="flags-header ${q.flags.type}">${q.flags.title}</div>
    <div class="flags-list">${q.flags.items.map(f => `
      <div class="flag-item ${q.flags.type === 'red' ? 'bad' : 'good'}">
        <span class="icon"><i class="fa-solid ${q.flags.type === 'red' ? 'fa-xmark' : 'fa-check'}"></i></span>
        <span class="text">${f}</span>
      </div>`).join('')}
    </div>
    <div class="explanation"><strong>Explanation</strong>${q.explanation}</div>
  </div>`;

  document.getElementById('two-col').innerHTML = scenarioHTML + flagsHTML;

  // options
  document.getElementById('options-row').innerHTML = q.options.map((opt, i) => `
    <button class="opt-btn" onclick="selectAnswer(${i})">
      <span class="opt-letter">${String.fromCharCode(65 + i)}</span>${opt}
    </button>`).join('');

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('next-btn').textContent = current < questions.length - 1 ? 'Next →' : 'See Results →';
}

function selectAnswer(idx){
  if(answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = idx === q.answer;
  if(isCorrect){ score++; correctQs.push(current); } else { wrongQs.push(current); }

  document.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.answer) btn.classList.add('correct');
    else if(i === idx && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('reveal');
    if(i === q.answer) btn.querySelector('.opt-letter').innerHTML = '<i class="fa-solid fa-check"></i>';
    else if(i === idx && !isCorrect) btn.querySelector('.opt-letter').innerHTML = '<i class="fa-solid fa-xmark"></i>';
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? `<strong>✓ Correct!</strong>${q.explanation}`
    : `<strong>✗ Not quite.</strong>${q.explanation}`;

  document.getElementById('score-display').textContent = score;
  document.getElementById('next-btn').classList.add('show');
}

function nextQ(){
  current++;
  if(current >= questions.length) showResult();
  else renderQ();
}

function showResult(){
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('prog-fill').style.width = '100%';
  const rs = document.getElementById('result-section');
  rs.style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  let emoji, title, sub;
  if(score >= 7){ emoji = '🛡️'; title = 'Phishing Expert!'; sub = 'Outstanding! You can confidently spot phishing attacks. Share this quiz with your team.'; }
  else if(score >= 5){ emoji = '✅'; title = 'Good Awareness'; sub = 'Solid understanding of phishing tactics. Review the questions you missed to sharpen your skills.'; }
  else if(score >= 3){ emoji = '⚠️'; title = 'Room to Improve'; sub = 'You caught some, but attackers could still fool you. Study each explanation and try again.'; }
  else { emoji = '🎣'; title = 'High Risk — Keep Practising'; sub = 'Phishing attacks would likely succeed right now. Read each scenario carefully and retake the quiz.'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-score').textContent = score + ' / ' + questions.length;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = sub;

  document.getElementById('score-summary').innerHTML = `
    <div class="score-row-item"><span>Correct answers</span><span class="correct-count">${score} / ${questions.length}</span></div>
    <div class="score-row-item"><span>Score</span><span>${pct}%</span></div>
    <div class="score-row-item"><span>Email scenarios</span><span>${correctQs.filter(i=>questions[i].tag==='EMAIL').length} / ${questions.filter(q=>q.tag==='EMAIL').length} correct</span></div>
    <div class="score-row-item"><span>Website scenarios</span><span>${correctQs.filter(i=>questions[i].tag==='WEBSITE').length} / ${questions.filter(q=>q.tag==='WEBSITE').length} correct</span></div>`;

  const badges = [
    { label: 'Email Expert', earned: correctQs.filter(i => questions[i].tag === 'EMAIL').length === questions.filter(q => q.tag === 'EMAIL').length },
    { label: 'URL Inspector', earned: correctQs.filter(i => questions[i].tag === 'WEBSITE').length === questions.filter(q => q.tag === 'WEBSITE').length },
    { label: 'Not Fooled by HTTPS', earned: correctQs.includes(3) },
    { label: 'Spotted the Legit One', earned: correctQs.includes(2) && correctQs.includes(6) },
    { label: 'Perfect Score', earned: score === questions.length },
  ];
  document.getElementById('badges').innerHTML = badges.map(b =>
    `<span class="badge ${b.earned ? 'earned' : ''}">${b.earned ? '✓ ' : ''}${b.label}</span>`
  ).join('');
}
</script>
</body>
</html>
